[advisories]
version = 2
yanked = "warn"
ignore = [
    # Transitive through libkrun's imago dependency; no maintained drop-in exists.
    "RUSTSEC-2025-0141",
    # Transitive through Nanocodex's bm25 dependency; no maintained drop-in exists.
    "RUSTSEC-2025-0057",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/containers/libkrun",
]
